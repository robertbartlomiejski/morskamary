            - name: Cache
  uses: actions/cache@v5.0.5
  with:
    # A list of files, directories, and wildcard patterns to cache and restore
    path: 
    # An explicit key for restoring and saving the cache
    key: 
    # An ordered multiline string listing the prefix-matched keys, that are used for restoring stale cache if no cache hit occurred for key. Note `cache-hit` returns false in this case.
    restore-keys: # optional
    # The chunk size used to split up large files during upload, in bytes
    upload-chunk-size: # optional
    # An optional boolean when enabled, allows windows runners to save or restore caches that can be restored or saved respectively on other platforms
    enableCrossOsArchive: # optional, default is false
    # Fail the workflow if cache entry is not found
    fail-on-cache-miss: # optional, default is false
    # Check if a cache entry exists for the given input(s) (key, restore-keys) without downloading the cache
    lookup-only: # optional, default is false
    # Run the post step to save the cache even if another step before fails
    save-always: # optional, default is false

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  conflict-marker-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect unresolved merge conflict markers
        shell: bash
        run: |
          set -euo pipefail

          matches="$(
            rg -n '^(<{7} .+|={7}|>{7} .+)$' . \
              --glob '!.git/**' \
              --glob '!outputs/**' \
              --glob '!data/raw/**' \
              --glob '!data/derived/**' \
            || true
          )"

          if [[ -n "$matches" ]]; then
            echo "Found unresolved merge conflict markers."
            echo
            echo "Offending files:"
            echo "$matches" | cut -d: -f1 | sort -u
            echo
            echo "Matching lines:"
            echo "$matches"
            exit 1
          fi

          echo "No merge conflict markers detected."

  governance-and-repro:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify required governance files exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "CITATION.txt"
            "DATA_GOVERNANCE.txt"
            "LLM_CONTEXT_INSTRUCTION.txt"
            "CHANGELOG.txt"
            "README.md"
          )
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "Governance scaffolding present."

      - name: Verify manifest generation is deterministic (if script exists)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "scripts/generate_manifest.py" ]]; then
            python3 --version

            python3 scripts/generate_manifest.py 2>&1 | tee /tmp/generate_manifest.out
            # Capture the last non-empty output line as the filename candidate.
            out="$(awk 'NF{line=$0} END{print line}' /tmp/generate_manifest.out || true)"

            found=""
            if [[ -n "$out" && -f "$out" ]]; then
              found="$out"
            fi

            if [[ -z "$found" && -n "$out" && -f "$(basename "$out")" ]]; then
              found="$(basename "$out")"
            fi

            if [[ -z "$found" ]]; then
              candidates=("MANIFEST_SOURCES.csv" "manifest.json" "MANIFEST.json" "manifest.txt" "MANIFEST.txt")
              for c in "${candidates[@]}"; do
                found="$(find . -maxdepth 3 -type f -name "$c" -print -quit || true)"
                if [[ -n "$found" ]]; then break; fi
              done
            fi

            if [[ -z "$found" ]]; then
              echo "generate_manifest.py ran but no manifest file found among candidates."
              echo "--- generate_manifest.py output ---"
              output_preview_lines=200
              sed -n "1,${output_preview_lines}p" /tmp/generate_manifest.out || true
              echo "Edit CI to match your actual manifest output filename."
              exit 1
            fi

            if ! git diff --exit-code -- "$found"; then
              echo "Manifest is not reproducible or not committed. Regenerate and commit $found."
              git diff -- "$found" || true
              exit 1
            fi
            echo "Manifest reproducibility check passed for: $found"
          else
            echo "No scripts/generate_manifest.py found; skipping manifest determinism check."
          fi

      - name: Enforce CHANGELOG update on PRs that change tracked artifacts (lightweight rule)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${{ github.base_ref }}"
          git fetch origin "$base_ref" --depth=1 || true

          changed="$(git diff --name-only "origin/$base_ref"...HEAD || true)"

          needs_changelog=0
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            [[ "$f" == "CHANGELOG.txt" ]] && continue

            if [[ "$f" == "scripts/"* ]] || [[ "$f" == "prompts/"* ]] || [[ "$f" == "templates/"* ]] || \
               [[ "$f" == "data/"* ]] || [[ "$f" == *.csv ]] || [[ "$f" == *.xlsx ]] || [[ "$f" == *.pdf ]] || \
               [[ "$f" == "CITATION.txt" ]] || [[ "$f" == "DATA_GOVERNANCE.txt" ]] || [[ "$f" == "LLM_CONTEXT_INSTRUCTION.txt" ]]; then
              needs_changelog=1
            fi
          done <<< "$changed"

          if [[ "$needs_changelog" -eq 1 ]]; then
            if ! echo "$changed" | grep -qx "CHANGELOG.txt"; then
              echo "PR changes substantive artifacts but does not update CHANGELOG.txt."
              echo "Changed files:"
              echo "$changed"
              exit 1
            fi
          fi

          echo "CHANGELOG enforcement passed."

  test-suite:
    needs: [conflict-marker-check]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov

      - name: Run test suite
        run: |
          python -m pytest tests/ -v --cov=src --cov=scripts --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
