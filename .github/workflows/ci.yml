name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  conflict-marker-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect unresolved merge conflict markers
        shell: bash
        run: |
          set -euo pipefail

          matches="$(
            rg -n '^(<{7} .+|={7}|>{7} .+)$' . \
              --glob '!.git/**' \
              --glob '!outputs/**' \
              --glob '!data/raw/**' \
              --glob '!data/derived/**' \
            || true
          )"

          if [[ -n "$matches" ]]; then
            echo "Found unresolved merge conflict markers."
            echo
            echo "Offending files:"
            echo "$matches" | cut -d: -f1 | sort -u
            echo
            echo "Matching lines:"
            echo "$matches"
            exit 1
          fi

          echo "No merge conflict markers detected."

  governance-and-repro:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fail on merge conflict markers
        shell: bash
        run: |
          set -euo pipefail
          rg_output=$(rg -n '^(<{7} .+|={7}|>{7} .+)$' . --glob '!.git/**' --glob '!outputs/**' || true)
          if [ -n "$rg_output" ]; then
            echo "Merge conflict markers found"
            echo "$rg_output"
            exit 1
          else
            echo "No markers"
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify required governance files exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "CITATION.txt"
            "DATA_GOVERNANCE.txt"
            "LLM_CONTEXT_INSTRUCTION.txt"
            "CHANGELOG.txt"
            "README.md"
          )
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "Governance scaffolding present."

      - name: Verify manifest generation is deterministic (if script exists)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "scripts/generate_manifest.py" ]]; then
            python3 --version

            python3 scripts/generate_manifest.py 2>&1 | tee /tmp/generate_manifest.out
            # Capture the last non-empty output line as the filename candidate.
            out="$(awk 'NF{line=$0} END{print line}' /tmp/generate_manifest.out || true)"

            found=""
            if [[ -n "$out" && -f "$out" ]]; then
              found="$out"
            fi

            if [[ -z "$found" && -n "$out" && -f "$(basename "$out")" ]]; then
              found="$(basename "$out")"
            fi

            if [[ -z "$found" ]]; then
              candidates=("MANIFEST_SOURCES.csv" "manifest.json" "MANIFEST.json" "manifest.txt" "MANIFEST.txt")
              for c in "${candidates[@]}"; do
                found="$(find . -maxdepth 3 -type f -name "$c" -print -quit || true)"
                if [[ -n "$found" ]]; then break; fi
              done
            fi

            if [[ -z "$found" ]]; then
              echo "generate_manifest.py ran but no manifest file found among candidates."
              echo "--- generate_manifest.py output ---"
              output_preview_lines=200
              sed -n "1,${output_preview_lines}p" /tmp/generate_manifest.out || true
              echo "Edit CI to match your actual manifest output filename."
              exit 1
            fi

            if ! git diff --exit-code -- "$found"; then
              echo "Manifest is not reproducible or not committed. Regenerate and commit $found."
              git diff -- "$found" || true
              exit 1
            fi
            echo "Manifest reproducibility check passed for: $found"
          else
            echo "No scripts/generate_manifest.py found; skipping manifest determinism check."
          fi

      - name: Enforce CHANGELOG update on PRs that change tracked artifacts (lightweight rule)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${{ github.base_ref }}"
          git fetch origin "$base_ref" --depth=1 || true
          python3 scripts/changelog_guard.py --base-ref "$base_ref"

  quick-mode-gate:
    needs: [governance-and-repro]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run sync audit (strict)
        run: python scripts/sync_audit.py --strict

      - name: Run quick-mode static analysis gate
        run: |
          python run_full_analysis.py --analysis-input-mode static
          python scripts/validate_generated_outputs.py
          python scripts/validate_research_source_outputs.py

      - name: Validate archived run integrity (if archive exists)
        run: |
          python scripts/validate_run_archive_integrity.py --archive-root outputs/run_archive

      - name: Verify outputs are in sync with generator
        run: |
          git diff --exit-code -- outputs/ || {
            echo "ERROR: outputs/ drifted after regeneration."
            echo "Run 'python run_full_analysis.py' locally and commit outputs/."
            exit 1
          }

  test-suite:
    needs: [conflict-marker-check]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run test suite
        run: |
          python -m pytest tests/ -v --cov=src --cov=scripts --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
