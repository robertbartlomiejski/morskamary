name: "CodeQL Advanced"

# NOTE:
# This repository currently has GitHub Code Scanning "default setup" enabled.
# Running an advanced CodeQL workflow in parallel causes SARIF upload failures:
# "CodeQL analyses from advanced configurations cannot be processed when the
# default setup is enabled."
#
# Keep this workflow as manual-only so CI remains green. If/when default setup
# is disabled in repository settings, this workflow can be restored to push/PR
# triggers.
on:
  workflow_dispatch:

jobs:
  codeql-disabled-notice:
    name: CodeQL advanced workflow disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this workflow is manual-only
        run: |
          echo "Skipping advanced CodeQL workflow."
          echo "Reason: GitHub default code scanning setup is enabled for this repository."
          echo "Disable default setup first before re-enabling advanced workflow triggers."
