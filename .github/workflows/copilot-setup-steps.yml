name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - requirements.txt
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - requirements.txt

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install repository and validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Verify deterministic development environment
        run: |
          set -euo pipefail
          python --version
          python -m flake8 --version
          python -m mypy --version
          python -m pytest --version
          python -c "import jsonschema, openpyxl, pandas, yaml; print('[OK] scientific dependencies available')"
