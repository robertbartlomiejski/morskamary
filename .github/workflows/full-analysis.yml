name: Full Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full analysis pipeline
        run: python run_full_analysis.py

      - name: Verify output artifacts
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "outputs/report_index.html"
            "outputs/gaps_by_sector.html"
            "outputs/credentials_matrix.html"
            "outputs/literature_integration.html"
            "outputs/competences_full_database.json"
            "outputs/credentials_database.json"
            "outputs/sector_pathways.json"
            "outputs/gaps_summary.csv"
          )
          for f in "${expected[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing expected output: $f"
              exit 1
            fi
            echo "✓ $f"
          done
          sector_dir="outputs/sector_dictionaries"
          if [[ ! -d "$sector_dir" ]]; then
            echo "Missing expected output directory: $sector_dir"
            exit 1
          fi
          sector_count="$(find "$sector_dir" -maxdepth 1 -type f -name '*_tmbd_dictionary.json' | wc -l | tr -d ' ')"
          if [[ "$sector_count" -ne 12 ]]; then
            echo "Expected 12 sector dictionary files, found: $sector_count"
            exit 1
          fi
          echo "✓ $sector_dir ($sector_count files)"
          echo "All output artifacts verified, including sector dictionaries."

      - name: Validate generated output semantics
        run: python scripts/validate_generated_outputs.py

      - name: Check committed outputs are in sync with generator
        run: |
          git diff --exit-code -- outputs || {
            echo ""
            echo "ERROR: Committed outputs/ are out of sync with the generator."
            echo "Run 'python run_full_analysis.py' locally and commit the updated outputs/."
            exit 1
          }

      - name: Upload analysis outputs
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: Morskamary_QMBD_Audit_Run_${{ github.run_id }}
          path: |
            outputs/
            data/derived/
          retention-days: 30
