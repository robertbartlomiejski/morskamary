name: Full Live-Enriched Analysis

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated providers. Default excludes providers requiring extra proprietary credentials in CI."
        required: false
        default: "crossref,scopus,wos"
      max_results_per_query:
        description: "Maximum results per query"
        required: false
        default: "50"
      offline:
        description: "Run in offline mode (true/false)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      require_valid_credentials:
        description: "Fail when configured proprietary credentials are invalid or rate-limited"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      require_live_records:
        description: "Fail live-enriched run if no live records reach outputs"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      commit_outputs:
        description: "Commit updated outputs/ back to main (requires vars.ALLOW_BOT_COMMITS=true)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: full-live-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-analysis:
    runs-on: ubuntu-latest
    # Fix 8: gate all proprietary-provider secrets and live-package publication
    # behind a GitHub Environments approval so production credentials require
    # maintainer review before use.  ALLOW_BOT_COMMITS and
    # LIVE_OUTPUTS_AUTOCOMMIT remain false-by-default; direct-push publication
    # is not added here.
    environment: live-research
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      REQUESTED_PROVIDERS: ${{ github.event.inputs.providers || 'crossref,scopus,wos' }}
      MAX_RESULTS_PER_QUERY: ${{ github.event.inputs.max_results_per_query || '50' }}
      OFFLINE_MODE: ${{ github.event.inputs.offline || 'false' }}
      REQUIRE_VALID_CREDENTIALS: ${{ github.event.inputs.require_valid_credentials || 'false' }}
      REQUIRE_LIVE_RECORDS: ${{ github.event.inputs.require_live_records || 'true' }}

      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
      SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
      WOS_API_KEY: ${{ secrets.WOS_API_KEY }}
      SCIVAL_API_KEY: ${{ secrets.SCIVAL_API_KEY }}
      MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
      MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
      MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fix 9: never leave a reusable Git credential on the live-analysis
          # runner where proprietary provider secrets are also exposed.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Capture single workflow-level analysis timestamp (UTC)
        # Recency-sensitive Layer 4-5 outputs must be deterministic across
        # steps within a single run.  Capture one ISO-8601 UTC timestamp here
        # and reuse it for the Layer 4-5 build so no downstream step calls
        # wall-clock `datetime.now()` independently for recency scoring.
        run: |
          set -euo pipefail
          ANALYSIS_TS="$(date -u +%Y-%m-%dT%H:%M:%S+00:00)"
          echo "ANALYSIS_TIMESTAMP_UTC=${ANALYSIS_TS}" >> "$GITHUB_ENV"
          echo "Captured analysis timestamp: ${ANALYSIS_TS}"

      - name: Provider health preflight
        if: ${{ env.OFFLINE_MODE != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p outputs

          HEALTH_ARGS=()
          if [ "$REQUIRE_VALID_CREDENTIALS" = "true" ]; then
            HEALTH_ARGS+=(--require-valid)
          fi

          python scripts/check_research_api_health.py \
            --providers "$REQUESTED_PROVIDERS" \
            --output outputs/research_api_health.json \
            "${HEALTH_ARGS[@]}"

      - name: Export provider capabilities
        run: |
          set -euo pipefail
          python scripts/export_research_source_capabilities.py

      - name: Project live query protocol into legacy query_groups
        run: |
          set -euo pipefail
          python scripts/export_live_query_protocol_projection.py \
            --protocol-path config/live_query_protocol.yml \
            --output-path outputs/research_sources/research_queries_from_protocol.yml \
            --emit-summary-path outputs/research_sources/research_queries_from_protocol_summary.json

      - name: Export live research records
        run: |
          set -euo pipefail
          python scripts/export_live_research_records.py \
            --providers "$REQUESTED_PROVIDERS" \
            --query-file outputs/research_sources/research_queries_from_protocol.yml \
            --max-results-per-query "$MAX_RESULTS_PER_QUERY" \
            --output-dir outputs/research_sources \
            --offline "$OFFLINE_MODE"

      - name: Validate research source outputs
        run: |
          set -euo pipefail

          if [ "$REQUIRE_LIVE_RECORDS" = "true" ] && [ "$OFFLINE_MODE" != "true" ]; then
            python scripts/validate_research_source_outputs.py \
              --require-health \
              --require-live \
              --min-live-records 1
          else
            python scripts/validate_research_source_outputs.py
          fi

      - name: Build Layer 1 live-run audit bundle
        run: |
          set -euo pipefail
          python scripts/build_live_run_audit.py \
            --run-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --research-sources-dir outputs/research_sources \
            --output-root outputs/live_runs \
            --protocol-path config/live_query_protocol.yml

      - name: Run full analysis
        run: |
          set -euo pipefail
          python run_full_analysis.py \
            --analysis-input-mode live-enriched \
            --live-records-path outputs/research_sources/live_records_triangulated.json

      - name: Assert cumulative output is live-enriched
        run: |
          set -euo pipefail
          ASSERT_ARGS=()
          if [ "$REQUIRE_LIVE_RECORDS" = "true" ] && [ "$OFFLINE_MODE" != "true" ]; then
            ASSERT_ARGS+=(--require-live)
          fi

          python scripts/assert_cumulative_live_enriched.py \
            --path outputs/cumulative_qmbd_records.json \
            "${ASSERT_ARGS[@]}"

      - name: Validate generated outputs
        run: |
          set -euo pipefail
          python scripts/validate_generated_outputs.py

          python - <<'PY'
          import json
          from datetime import datetime, UTC
          from pathlib import Path

          payload = {
              "validator": "scripts/validate_generated_outputs.py",
              "status": "passed",
              "captured_at": datetime.now(UTC).replace(microsecond=0).isoformat(),
          }
          output_path = Path("outputs") / "validation_state.json"
          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          print(f"Validation state captured: {output_path}")
          PY

      - name: Archive full run outputs
        run: |
          set -euo pipefail
          python scripts/archive_run_outputs.py \
            --repo-root . \
            --archive-root outputs/run_archive \
            --run-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --workflow-name "${{ github.workflow }}" \
            --event-name "${{ github.event_name }}" \
            --git-sha "${{ github.sha }}" \
            --git-ref "${{ github.ref }}" \
            --github-run-id "${{ github.run_id }}" \
            --github-run-attempt "${{ github.run_attempt }}" \
            --github-run-number "${{ github.run_number }}" \
            --github-job "$GITHUB_JOB" \
            --providers "$REQUESTED_PROVIDERS" \
            --max-results-per-query "$MAX_RESULTS_PER_QUERY" \
            --offline "$OFFLINE_MODE" \
            --require-live-records "$REQUIRE_LIVE_RECORDS" \
            --query-file outputs/research_sources/research_queries_from_protocol.yml

      - name: Validate archived run integrity
        run: |
          set -euo pipefail
          python scripts/validate_run_archive_integrity.py \
            --archive-root outputs/run_archive \
            --require-present

      - name: Preserve previous novelty metrics for Gate B
        run: |
          set -euo pipefail
          previous_metrics="outputs/cumulative_database/run_novelty_metrics.json"
          preserved_metrics="outputs/previous_run_novelty_metrics.json"
          if [ -f "$previous_metrics" ]; then
            cp "$previous_metrics" "$preserved_metrics"
          fi

      - name: Build cumulative scientific database (Layers 2 and 3)
        run: |
          set -euo pipefail
          python scripts/build_cumulative_scientific_database.py \
            --current-run outputs \
            --archive-root outputs/run_archive \
            --live-runs-root outputs/live_runs \
            --query-protocol config/live_query_protocol.yml \
            --output-dir outputs/cumulative_database \
            --current-run-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --emit-summary

      - name: Build derived competence demand and gap model (Layers 4 and 5)
        run: |
          set -euo pipefail
          python scripts/build_layer4_5_scientific_analysis.py \
            --database-dir outputs/cumulative_database \
            --output-dir outputs/cumulative_database \
            --stats-dir outputs/layer4_statistics \
            --current-run-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --analysis-timestamp-utc "$ANALYSIS_TIMESTAMP_UTC"

      - name: Evaluate live novelty gates (A-E)
        run: |
          set -euo pipefail
          python scripts/compute_live_novelty_metrics.py \
            --metrics outputs/cumulative_database/run_novelty_metrics.json \
            --provider-health outputs/research_api_health.json \
            --previous-metrics outputs/previous_run_novelty_metrics.json \
            --current-run outputs \
            --output outputs/cumulative_database/novelty_gate_report.json \
            --strict

      - name: Build statistical research report (HTML + PDF)
        run: |
          set -euo pipefail
          python scripts/build_statistical_research_report.py \
            --database-dir outputs/cumulative_database \
            --output-dir reports \
            --current-run-id "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Build live cumulative release package (single ZIP)
        run: |
          set -euo pipefail
          python scripts/build_live_cumulative_release_package.py \
            --database-dir outputs/cumulative_database \
            --reports-dir reports \
            --stats-dir outputs/layer4_statistics \
            --raw-acquisition-index "outputs/live_runs/${{ github.run_id }}-${{ github.run_attempt }}/raw/raw_acquisition_index.csv" \
            --current-run-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --version-tag "${{ github.run_id }}-${{ github.run_attempt }}" \
            --output outputs/release_packages/morskamary_live_cumulative_latest.zip

      - name: Upload live-enriched analysis outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-enriched-analysis-outputs
          path: |
            outputs/
            outputs/run_archive/
            outputs/live_runs/
            outputs/cumulative_database/
            outputs/layer4_statistics/
            outputs/release_packages/
            reports/
            data/derived/
          if-no-files-found: warn
          retention-days: 30

  commit-outputs:
    # Fix 10: publication path is disabled-by-default and never pushes generated
    # outputs directly to main.  A uniquely named bot branch is created and a
    # pull request is opened against main instead.  Repository/organization
    # Actions policy must allow the chosen bot identity (default: GITHUB_TOKEN
    # via `gh pr create`) to create PRs; note that GITHUB_TOKEN-created PRs may
    # require an explicit follow-up trigger for CI checks to run.  No PAT or
    # proprietary provider secret is introduced or exposed here.
    needs: live-analysis
    runs-on: ubuntu-latest
    # Gate publication behind the same reviewer-approved environment as the
    # live-analysis job so any credential use is auditable.
    environment: live-research
    permissions:
      # Least privilege: contents:write to create the bot branch, and
      # pull-requests:write so `gh pr create` can open the PR against main.
      contents: write
      pull-requests: write
    if: >
      github.ref == 'refs/heads/main' &&
      vars.ALLOW_BOT_COMMITS == 'true' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.commit_outputs == 'true') ||
        (github.event_name == 'schedule' && vars.LIVE_OUTPUTS_AUTOCOMMIT == 'true')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fix 9: do not leave a reusable Git credential in the runner.  We
          # authenticate the single push explicitly using GITHUB_TOKEN below.
          persist-credentials: false

      - name: Download analysis outputs
        uses: actions/download-artifact@v4
        with:
          name: live-enriched-analysis-outputs
          path: .

      - name: Create bot branch and open pull request against main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fix 10: never push generated outputs directly to main.  Stage only
          # the validated allowlisted output paths onto a uniquely named
          # bot/live-research/<run_id>/<run_attempt> branch and open a PR.
          BOT_BRANCH="bot/live-research/${RUN_ID}/${RUN_ATTEMPT}"

          git config user.name "morskamary-bot"
          git config user.email "actions@github.com"

          git checkout -b "$BOT_BRANCH"

          # Allowlisted output paths only.  Anything outside this list is not
          # staged, so drift in the artifact download cannot leak unrelated
          # files into the PR.
          git add \
            outputs/ \
            outputs/run_archive/ \
            outputs/live_runs/ \
            outputs/cumulative_database/ \
            outputs/layer4_statistics/ \
            outputs/release_packages/ \
            reports/

          if git diff --cached --quiet; then
            echo "[INFO] No output changes to publish; skipping PR creation."
            exit 0
          fi

          git commit -m "chore: refresh live-enriched outputs (run ${RUN_ID}/${RUN_ATTEMPT})"

          # Push the bot branch using GITHUB_TOKEN explicitly for this single
          # operation, then unset the remote credential.  No PAT is used.
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push "$REMOTE_URL" "HEAD:refs/heads/${BOT_BRANCH}"

          PR_TITLE="chore(live-research): refresh outputs from run ${RUN_ID}/${RUN_ATTEMPT}"
          PR_BODY_FILE="$(mktemp)"
          {
            echo "Automated publication of live-enriched analysis outputs."
            echo
            echo "- Workflow run: ${RUN_ID}, attempt ${RUN_ATTEMPT}"
            echo "- Source branch: \`${BOT_BRANCH}\`"
            echo "- Target branch: \`main\`"
            echo
            echo "This PR was opened by the live-analysis workflow because the"
            echo "double publication gate (\`commit_outputs\`/\`ALLOW_BOT_COMMITS\`,"
            echo "and \`LIVE_OUTPUTS_AUTOCOMMIT\` for scheduled runs) was enabled."
            echo "No generated outputs are pushed directly to \`main\`."
          } > "$PR_BODY_FILE"

          # Fix 10: failure to open the PR must be explicit; do not swallow the
          # error and do not fall back to a direct push to main.
          if ! gh pr create \
                --repo "$REPO" \
                --base main \
                --head "$BOT_BRANCH" \
                --title "$PR_TITLE" \
                --body-file "$PR_BODY_FILE"; then
            echo "[ERROR] Failed to open pull request for ${BOT_BRANCH}." >&2
            echo "[ERROR] Repository/organization Actions policy must allow" >&2
            echo "[ERROR] the bot identity to create pull requests." >&2
            exit 1
          fi
