name: Research API Smoke

on:
  # Manual trigger only — live API tests never run in default CI.
  workflow_dispatch:
    inputs:
      live_api_tests:
        description: "Enable live proprietary API calls (requires secrets)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  research-api-smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LIVE_RESEARCH_API_TESTS: ${{ github.event.inputs.live_api_tests || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Provider configuration audit
        run: |
          python scripts/audit_research_api_config.py

      - name: Offline smoke test (always runs)
        run: |
          python scripts/smoke_scientific_bridge.py --offline

      - name: Live smoke test (only if secrets present and enabled)
        if: github.event.inputs.live_api_tests == 'true'
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          WOS_API_KEY: ${{ secrets.WOS_API_KEY }}
          SCIVAL_API_KEY: ${{ secrets.SCIVAL_API_KEY }}
        run: |
          LIVE_RESEARCH_API_TESTS=true \
            python scripts/smoke_scientific_bridge.py --live-if-secrets-present

      - name: Export provider capabilities
        run: |
          python scripts/export_research_source_capabilities.py

      - name: Validate research source outputs
        run: |
          python scripts/validate_research_source_outputs.py

      - name: Upload sanitized capability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-source-capabilities
          path: outputs/research_source_capabilities.json
          if-no-files-found: warn
          retention-days: 7
