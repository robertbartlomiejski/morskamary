name: Research API Smoke

on:
  workflow_dispatch:
    inputs:
      live_api_tests:
        description: "Enable live proprietary API calls (requires secrets)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  research-api-smoke:
    runs-on: ubuntu-latest
    # Proprietary provider secrets (Elsevier, Scopus, WoS, SciVal, Microsoft Graph)
    # require a reviewer-approved environment before they are exposed to the runner.
    environment: live-research
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LIVE_RESEARCH_API_TESTS: ${{ github.event.inputs.live_api_tests || 'false' }}

      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
      SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
      WOS_API_KEY: ${{ secrets.WOS_API_KEY }}
      SCIVAL_API_KEY: ${{ secrets.SCIVAL_API_KEY }}
      MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
      MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
      MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Provider configuration audit
        run: |
          set -euo pipefail
          python scripts/audit_research_api_config.py

      - name: Offline smoke test
        run: |
          set -euo pipefail
          python scripts/smoke_scientific_bridge.py --offline

      - name: Provider health preflight
        run: |
          set -euo pipefail
          mkdir -p outputs
          python scripts/check_research_api_health.py \
            --output outputs/research_api_health.json

      - name: Live smoke test
        if: github.event.inputs.live_api_tests == 'true'
        run: |
          set -euo pipefail
          python scripts/check_research_api_health.py \
            --require-valid \
            --output outputs/research_api_health.json

          LIVE_RESEARCH_API_TESTS=true \
            python scripts/smoke_scientific_bridge.py --live-if-secrets-present

      - name: Export provider capabilities
        run: |
          set -euo pipefail
          python scripts/export_research_source_capabilities.py

      - name: Validate research source outputs
        run: |
          set -euo pipefail
          python scripts/validate_research_source_outputs.py --require-health

      - name: Upload sanitized research API reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-api-smoke-reports
          path: |
            outputs/research_source_capabilities.json
            outputs/research_api_health.json
            outputs/research_api_smoke_report.json
          if-no-files-found: warn
          retention-days: 7
