# cloudbuild.live.yaml — Live API Cloud Build mirror for morskamary
#
# This file is NOT the primary CI configuration.  GitHub Actions (.github/workflows/)
# remains the primary CI.  This file provides a live research API mirror that
# requires populated Secret Manager secrets.
#
# Prerequisites:
#   1. Run terraform apply in infra/gcp-mirror/ to create secret containers.
#   2. Run scripts/bootstrap_research_secrets.sh --backend gcp to populate values.
#   3. Verify: gcloud secrets versions list crossref-mailto --project=YOUR_PROJECT_ID
#
# Usage:
#   gcloud builds submit --config cloudbuild.live.yaml
#
# One-command wrapper (recommended — checks auth/secrets before submitting):
#   ./scripts/run_cloudbuild_research_full.sh --live
#   # Windows:
#   # scripts/run_cloudbuild_research_full.ps1 -Live
#
# For offline use (no secrets required), use cloudbuild.yaml instead.
# See docs/GOOGLE_CLOUD_BUILD_OPTIONAL_SETUP.md for full setup instructions.

# Secret Manager versions.  All five containers must have at least one version.
# If any secret has no version, Cloud Build will fail before the first step runs.
# Use scripts/bootstrap_research_secrets.sh --backend gcp to add versions.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/crossref-mailto/versions/latest
      env: CROSSREF_MAILTO
    - versionName: projects/$PROJECT_ID/secrets/elsevier-api-key/versions/latest
      env: ELSEVIER_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/scopus-api-key/versions/latest
      env: SCOPUS_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/wos-api-key/versions/latest
      env: WOS_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/scival-api-key/versions/latest
      env: SCIVAL_API_KEY

steps:
  # Step 1: Install dependencies (Python 3.11, matching CI matrix)
  - name: "python:3.11"
    id: install
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install -e .[dev]
        echo "=== Installation complete ==="

  # Step 2: Run unit tests
  - name: "python:3.11"
    id: test
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python -m pytest tests/ -v --tb=short
        echo "=== Tests passed ==="
    waitFor: ["install"]

  # Step 3: Run full analysis and verify output determinism
  - name: "python:3.11"
    id: full-analysis
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python run_full_analysis.py
        python scripts/validate_generated_outputs.py
        git diff --exit-code -- outputs || {
          echo "ERROR: outputs/ differ from committed state."
          echo "Run python run_full_analysis.py locally and commit the results."
          exit 1
        }
        echo "=== Full analysis and output validation passed ==="
    waitFor: ["test"]

  # Step 4: Research API configuration audit
  - name: "python:3.11"
    id: audit-config
    entrypoint: bash
    secretEnv:
      - CROSSREF_MAILTO
      - ELSEVIER_API_KEY
      - SCOPUS_API_KEY
      - WOS_API_KEY
      - SCIVAL_API_KEY
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python scripts/audit_research_api_config.py
        echo "=== API config audit complete ==="
    waitFor: ["full-analysis"]

  # Step 5: Offline smoke test (always runs even in live mode)
  - name: "python:3.11"
    id: smoke-offline
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python scripts/smoke_scientific_bridge.py --offline
        echo "=== Offline smoke test passed ==="
    waitFor: ["audit-config"]

  # Step 6: Live research API smoke test.
  # Secrets are injected from Secret Manager — values are NEVER printed.
  # Note: Crossref is fully implemented. Elsevier/Scopus/WoS/SciVal are
  # capability-gated stubs; live calls for those will indicate "not configured"
  # unless Phase 2 live API implementation is complete.
  - name: "python:3.11"
    id: smoke-live
    entrypoint: bash
    secretEnv:
      - CROSSREF_MAILTO
      - ELSEVIER_API_KEY
      - SCOPUS_API_KEY
      - WOS_API_KEY
      - SCIVAL_API_KEY
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        echo "Running live research API smoke test..."
        echo "Note: live calls are active for Crossref only."
        echo "Proprietary providers (Elsevier/Scopus/WoS/SciVal) are stubs pending Phase 2."
        LIVE_RESEARCH_API_TESTS=true \
          python scripts/smoke_scientific_bridge.py --live-if-secrets-present
        echo "=== Live smoke step complete ==="
    waitFor: ["smoke-offline"]

  # Step 7: Export provider capabilities snapshot
  - name: "python:3.11"
    id: export-capabilities
    entrypoint: bash
    secretEnv:
      - CROSSREF_MAILTO
      - ELSEVIER_API_KEY
      - SCOPUS_API_KEY
      - WOS_API_KEY
      - SCIVAL_API_KEY
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python scripts/export_research_source_capabilities.py
        python scripts/validate_research_source_outputs.py
        echo "=== Capabilities exported and validated ==="
    waitFor: ["smoke-live"]

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "2400s"
