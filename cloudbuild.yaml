# cloudbuild.yaml — Optional Google Cloud Build mirror for morskamary
#
# This file is NOT the primary CI configuration.  GitHub Actions (.github/workflows/)
# remains the primary CI.  This file provides an optional mirror that can be
# triggered manually or via Cloud Build trigger.
#
# Usage (offline/default — no live API calls):
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_LIVE_RESEARCH_API_TESTS=false,_PROVIDER_STRICT_MODE=false
#
# Usage (full research run — requires secrets in Secret Manager):
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_LIVE_RESEARCH_API_TESTS=true,_PROVIDER_STRICT_MODE=true
#
# See docs/GOOGLE_CLOUD_BUILD_OPTIONAL_SETUP.md for setup instructions.
# See docs/ONE_CLICK_RESEARCH_RUNBOOK.md for the one-command workflow.

substitutions:
  _LIVE_RESEARCH_API_TESTS: "false"
  _PROVIDER_STRICT_MODE: "false"

# Secret versions — populated manually via bootstrap_research_secrets.sh.
# Cloud Build will only mount these if the secret containers have at least
# one version. If a version is absent, the build step will fail with a
# clear error message from Secret Manager.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/crossref-mailto/versions/latest
      env: CROSSREF_MAILTO
    - versionName: projects/$PROJECT_ID/secrets/elsevier-api-key/versions/latest
      env: ELSEVIER_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/scopus-api-key/versions/latest
      env: SCOPUS_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/wos-api-key/versions/latest
      env: WOS_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/scival-api-key/versions/latest
      env: SCIVAL_API_KEY

steps:
  # Step 1: Install dependencies (Python 3.11, matching CI matrix)
  - name: "python:3.11"
    id: install
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install -e .[dev]
        echo "=== Installation complete ==="

  # Step 2: Run unit tests
  - name: "python:3.11"
    id: test
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python -m pytest tests/ -v --tb=short
        echo "=== Tests passed ==="
    waitFor: ["install"]

  # Step 3: Run full analysis and verify output determinism
  - name: "python:3.11"
    id: full-analysis
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python run_full_analysis.py
        python scripts/validate_generated_outputs.py
        git diff --exit-code -- outputs || {
          echo "ERROR: outputs/ differ from committed state."
          echo "Run python run_full_analysis.py locally and commit the results."
          exit 1
        }
        echo "=== Full analysis and output validation passed ==="
    waitFor: ["test"]

  # Step 4: Research API configuration audit (always offline)
  - name: "python:3.11"
    id: audit-config
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python scripts/audit_research_api_config.py
        echo "=== API config audit complete ==="
    waitFor: ["full-analysis"]

  # Step 5: Offline smoke test (no live API calls)
  - name: "python:3.11"
    id: smoke-offline
    entrypoint: bash
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        python scripts/smoke_scientific_bridge.py --offline
        echo "=== Offline smoke test passed ==="
    waitFor: ["audit-config"]

  # Step 6: Live research API smoke test (only if _LIVE_RESEARCH_API_TESTS=true)
  # Secrets are injected from Secret Manager — values are NEVER printed.
  - name: "python:3.11"
    id: smoke-live
    entrypoint: bash
    secretEnv:
      - CROSSREF_MAILTO
      - ELSEVIER_API_KEY
      - SCOPUS_API_KEY
      - WOS_API_KEY
      - SCIVAL_API_KEY
    args:
      - "-lc"
      - |
        set -euo pipefail
        python -m pip install -e .[dev] --quiet
        if [ "$_LIVE_RESEARCH_API_TESTS" = "true" ]; then
          echo "Running live research API smoke test..."
          LIVE_RESEARCH_API_TESTS=true \
            python scripts/smoke_scientific_bridge.py --live-if-secrets-present
        else
          echo "Live API tests skipped (_LIVE_RESEARCH_API_TESTS=$_LIVE_RESEARCH_API_TESTS)."
          echo "Pass --substitutions=_LIVE_RESEARCH_API_TESTS=true to enable."
        fi
        echo "=== Live smoke step complete ==="
    waitFor: ["smoke-offline"]

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"
