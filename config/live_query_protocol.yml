# config/live_query_protocol.yml
#
# Live query protocol registry (PR-190 / Layer 0).
#
# This file is the richer, structured successor to `config/research_queries.yml`.
# The legacy file MUST remain in place for backward compatibility with
# `scripts/export_live_research_records.py`; this protocol layer is additive.
#
# Design principles
# -----------------
# Each query is a first-class research protocol record with a stable
# `query_id`, an explicit `query_family`, a target QMBD axis, a documented
# sampling/sort strategy, and a declared expected evidence signal. This
# structure exists so that live API runs can be audited scientifically: what
# was asked, why, from which family, against which axis, with what expected
# yield of competence-demand evidence.
#
# Sector coverage
# ---------------
# The 12 canonical blue economy sectors (see `run_full_analysis.SECTORS`) are
# each represented with FOUR query families:
#
#   - core_sector                 : >=3 queries per sector
#   - competence_demand           : >=2 queries per sector, must include
#                                   competence/workforce/education vocabulary
#   - emerging_demand             : >=2 queries per sector, must include
#                                   forward-looking / cross-cutting signals
#   - validation_eqf_translation  : >=1 query per sector, targeting EQF /
#                                   micro-credential validation literature
#
# Minimum total queries across all sectors: 12 * (3 + 2 + 2 + 1) = 96.
#
# QMBD axis assignments
# ---------------------
# Sector-primary axis assignments follow the domain reasoning in
# src/core.py::BlueDynamicsAxis and src/axis_classifier.py:
#
#   MARINE         : Blue Biotech, Living Res., Non-living Res.
#   MARITIME       : Infra & Robotics, Renewable Energy, Maritime Defence,
#                    Maritime Transport, Port Activities, Ship Repair
#   OCEANIC        : Coastal Tourism, R&I
#   HYDRONIZATION  : Desalination
#
# Individual queries within a sector MAY declare a different `axis_target`
# from the sector-primary axis when the query explicitly targets literature
# governed by a different axis (e.g. a Port Activities query about port
# governance may target OCEANIC).
#
# Backward compatibility
# ----------------------
# `src/scientific_sources/live_query_protocol.py::LiveQueryProtocol
# .to_legacy_query_groups()` renders this protocol into the exact shape of
# `config/research_queries.yml` (i.e. `{query_groups: {sector_slug: {label,
# description, queries: [text, ...]}}}`) so the current exporter continues
# to work unchanged.
#
# Schema
# ------
# Top-level:
#
#   protocol_version: string (semver)
#   query_families: [core_sector, competence_demand, emerging_demand,
#                    validation_eqf_translation]
#   sectors:
#     <sector_slug>:
#       label:        canonical sector label (matches run_full_analysis.SECTORS)
#       description:  short human-readable sector description
#       axis_primary: default axis for the sector (MARINE|MARITIME|OCEANIC|HYDRONIZATION)
#       queries:
#         - query_id:          stable slug (e.g. Q_BLUE_BIOTECH_CORE_001)
#           sector:            canonical sector label
#           sector_slug:       sector slug in this file
#           axis_target:       axis this specific query targets
#           query_text:        provider-agnostic search string
#           query_family:      one of the four families
#           evidence_intent:   dominant expected evidence intent
#           time_window:
#             from_year: int
#             to_year:   int
#           sort_strategy:
#             crossref: string
#             scopus:   string
#             wos:      string
#           sampling_strategy:
#             mode:          e.g. stratified
#             pages:         int
#             rows_per_page: int
#             dedupe_key:    e.g. doi|normalized_title
#           expected_signal: [...]

protocol_version: "1.0.0"

query_families:
  - core_sector
  - competence_demand
  - emerging_demand
  - validation_eqf_translation

# Shared defaults referenced via YAML anchors keep per-query records short
# while remaining valid stand-alone YAML.
_defaults:
  time_window: &default_time_window
    from_year: 2019
    to_year: 2026
  sort_strategy: &default_sort_strategy
    crossref: published-desc
    scopus: date-desc
    wos: date-desc
  sampling_strategy: &default_sampling_strategy
    mode: stratified
    pages: 3
    rows_per_page: 50
    dedupe_key: doi|normalized_title
  expected_signal_core: &expected_signal_core
    - competence_demand
    - workforce_skill
    - education_training
    - governance
    - sustainability
  expected_signal_competence: &expected_signal_competence
    - competence_demand
    - workforce_skill
    - education_training
    - curriculum
    - qualification
  expected_signal_emerging: &expected_signal_emerging
    - emerging_demand
    - technology_adoption
    - resilience
    - just_transition
    - sustainability
  expected_signal_validation: &expected_signal_validation
    - qualification
    - eqf_translation
    - micro_credential
    - assessment
    - learning_outcomes

