# config/research_queries.yml
#
# Research query groups for the 12 canonical blue economy sectors.
# Used by scripts/export_live_research_records.py to fetch literature
# from configured providers (Crossref, Scopus, Web of Science, etc.).
#
# Query design principles:
# - Target scholarly/academic databases (journal articles, conference papers)
# - Balance specificity (sector focus) with coverage (multiple relevant terms)
# - Include governance, policy, and sustainability aspects for Blue Sociology
# - Align with QMBD axes: Marine, Maritime, Oceanic, Hydronization
#
# Sector definitions from EU Sustainable Blue Economy framework and
# Blue Social Competences baseline (University of Szczecin).

query_groups:

  blue_biotech:
    label: "Blue Biotech"
    description: "Marine biotechnology, bioeconomy, bioprospecting, biomaterials, and blue innovation pathways."
    queries:
      - "marine biotechnology blue bioeconomy innovation governance"
      - "bioprospecting marine genetic resources benefit sharing"
      - "marine biomaterials pharmaceuticals bioremediation sustainability"

  coastal_tourism:
    label: "Coastal Tourism"
    description: "Coastal and marine tourism, cruise tourism, ecotourism, and tourism governance."
    queries:
      - "coastal tourism sustainability overtourism management"
      - "marine ecotourism blue economy livelihoods governance"
      - "cruise tourism environmental impact governance"

  desalination:
    label: "Desalination"
    description: "Desalination systems, brine management, water-energy nexus, and hydrosocial governance."
    queries:
      - "desalination brine management environmental impact governance"
      - "desalination water energy nexus sustainability"
      - "desalination hydrosocial water justice governance"

  infra_robotics:
    label: "Infra & Robotics"
    description: "Blue infrastructure, offshore/coastal robotics, monitoring systems, and cyber-physical maritime systems."
    queries:
      - "maritime infrastructure cyber physical systems digital twin"
      - "offshore robotics marine monitoring autonomous systems"
      - "smart coastal infrastructure flood risk adaptation"

  living_res:
    label: "Living Res."
    description: "Living marine resources: fisheries, aquaculture, mariculture, and coastal livelihoods."
    queries:
      - "small scale fisheries livelihoods blue economy governance"
      - "fisheries management sustainability marine protected areas"
      - "aquaculture social licence environmental impact governance"

  non_living_res:
    label: "Non-living Res."
    description: "Non-living marine resources: seabed resources, aggregates, critical raw materials, and extraction governance."
    queries:
      - "seabed mining governance environmental impact social licence"
      - "marine aggregates extraction coastal governance sustainability"
      - "critical raw materials offshore extraction governance"

  renewable_energy:
    label: "Renewable Energy"
    description: "Offshore renewable energy: wind, wave, tidal, and related spatial planning and social acceptance."
    queries:
      - "offshore wind energy marine spatial planning governance"
      - "ocean renewable energy governance sustainability"
      - "tidal energy wave energy environmental impact"

  maritime_defence:
    label: "Maritime Defence"
    description: "Maritime security, naval operations, surveillance, and defence governance in blue spaces."
    queries:
      - "maritime security governance blue economy"
      - "naval operations maritime domain awareness surveillance"
      - "critical maritime infrastructure protection governance"

  maritime_transport:
    label: "Maritime Transport"
    description: "Shipping, freight/passenger transport, maritime safety, labour conditions, and decarbonization."
    queries:
      - "maritime transport decarbonization emissions reduction"
      - "shipping governance international regulations IMO"
      - "maritime safety maritime labour conditions"

  port_activities:
    label: "Port Activities"
    description: "Port operations, logistics, port governance, and coastal urban-port interfaces."
    queries:
      - "port governance maritime logistics sustainability"
      - "smart ports digital transformation port operations"
      - "port climate adaptation sea level rise flood risk"

  r_i:
    label: "R&I"
    description: "Blue research and innovation ecosystems, ocean observation, data infrastructure, and research governance."
    queries:
      - "ocean observation marine monitoring data infrastructure"
      - "ocean data governance FAIR CARE principles"
      - "blue economy research innovation policy governance"

  ship_repair:
    label: "Ship Repair"
    description: "Ship repair, maintenance, shipyards, retrofit/decarbonization, and workforce competences."
    queries:
      - "ship repair shipyard workforce skills training"
      - "ship retrofit decarbonization maintenance governance"
      - "maritime repair supply chain safety standards"
